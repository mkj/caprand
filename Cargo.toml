[package]
name = "caprand"
version = "0.1.0"
edition = "2021"

[dependencies]

cortex-m = "0.7"
embassy-rp = { version = "0.1.0",  features = ["unstable-traits", "nightly", "unstable-pac", "time-driver"] }
defmt = { version = "0.3", optional = true }

getrandom = { version = "0.2", default-features = false }
critical-section = "1.1"
sha2 = { version = "0.10", default-features = false }
rand_chacha = { version = "0.3", default-features = false }

log = { version = "0.4", default-features = false }

[dev-dependencies]
cortex-m-rt = "0.7.0"
cortex-m = { version = "0.7", features = ["critical-section-single-core"]}
embassy-executor = { version = "0.1.0", features = ["integrated-timers"] }
embassy-usb = { version = "0.1.0", features = ["defmt"] }
embassy-futures = { version = "0.1.0" }
embassy-time = { version = "0.1.0" }
panic-probe = { version = "0.3" }
defmt-rtt = { version = "0.3" }
getrandom = { version = "0.2", default-features = false, features = ["custom"]}

[features]
defmt = [ "dep:defmt" ]

[profile.release]
debug = 2

[patch.crates-io]
# embassy-rp isn't released to crates.io yet
embassy-rp = { git = "https://github.com/embassy-rs/embassy", rev = "61be0e75c83961a42fc1d844159f1fed7d8afbea" }
embassy-executor = { git = "https://github.com/embassy-rs/embassy", rev = "61be0e75c83961a42fc1d844159f1fed7d8afbea" }
embassy-time = { git = "https://github.com/embassy-rs/embassy", rev = "61be0e75c83961a42fc1d844159f1fed7d8afbea" }
embassy-usb = { git = "https://github.com/embassy-rs/embassy", rev = "61be0e75c83961a42fc1d844159f1fed7d8afbea" }
embassy-futures = { git = "https://github.com/embassy-rs/embassy", rev = "61be0e75c83961a42fc1d844159f1fed7d8afbea" }
